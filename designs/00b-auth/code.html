<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#E94560",
                        "on-primary": "#ffffff",
                        "background": "#F8F9FA",
                        "surface": "#F8F9FA",
                        "on-surface": "#261819",
                        "on-surface-variant": "#5a4042",
                        "outline-variant": "#e2bebf",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#fff0f0",
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "md": "16px",
                        "lg": "24px",
                        "base": "4px",
                        "xl": "32px",
                        "sm": "12px",
                        "gutter": "16px",
                        "container-margin": "20px",
                        "xs": "8px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "h2": ["Inter"],
                        "label-bold": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "h2": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "label-bold": ["14px", {"lineHeight": "20px", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #F8F9FA;
        }
    </style>
</head>
<body class="h-screen text-on-surface font-body-md overflow-hidden bg-background">
<main class="max-w-[480px] mx-auto h-full flex flex-col px-container-margin py-xl">
<!-- Header Branding (Optional, small for space) -->
<div class="flex justify-center mb-xl">
<div class="bg-primary p-2 rounded-xl">
<span class="material-symbols-outlined text-white text-3xl" data-icon="receipt_long">receipt_long</span>
</div>
</div>
<div class="flex-1 flex flex-col justify-center">
<!-- Tab Toggles -->
<div class="flex border-b border-outline-variant/30 mb-lg">
<button class="flex-1 pb-md font-label-bold text-label-bold text-primary border-b-2 border-primary">
                    Sign In
                </button>
<button class="flex-1 pb-md font-label-bold text-label-bold text-on-surface-variant">
                    Sign Up
                </button>
</div>
<!-- Sign In Form Section -->
<form class="space-y-md">
<div class="space-y-2">
<label class="block font-label-bold text-label-bold text-on-surface">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant" data-icon="mail">mail</span>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container-lowest border border-outline-variant rounded-xl focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-on-surface-variant/50" placeholder="name@example.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<label class="block font-label-bold text-label-bold text-on-surface">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant" data-icon="lock">lock</span>
<input class="w-full h-14 pl-12 pr-12 bg-surface-container-lowest border border-outline-variant rounded-xl focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-on-surface-variant/50" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="flex justify-end">
<a class="font-label-bold text-label-bold text-primary hover:opacity-80 transition-opacity" href="#">Forgot Password?</a>
</div>
<!-- Primary Action -->
<button class="w-full h-14 bg-primary text-on-primary rounded-full font-h2 text-body-lg font-bold shadow-lg shadow-primary/20 hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center mt-base" type="submit">
                    Sign In
                </button>
</form>
<!-- Divider -->
<div class="relative flex items-center py-lg">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="flex-shrink mx-4 text-on-surface-variant font-label-bold text-label-bold">or continue with</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<!-- Social Buttons -->
<div class="flex justify-center gap-md">
<!-- Google -->
<button class="w-16 h-16 flex items-center justify-center border border-outline-variant rounded-xl bg-white hover:bg-surface-container-low transition-colors shadow-sm overflow-hidden p-0">
<img alt="Google" class="w-full h-full object-cover p-3" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDA4O65Yvv7UU4qJiP1yZ1HIO9N4EVYj82o5ov8Rli7sLS8Oa6VfMY6BSxKEXMp8AEMoYtp3TwFU3ImrrLD8DRaSXaZ415Naxw8FZs14xqz4OZZkcPVbpgVw8X1rJpF5NBnMke_N5WyqIiIMc939806MR0dqwSxg13P0_9w5iGDHOny99dcsltTWa6PGHNJgW5Bt_Fua8K1ygCTjSx3FO3biaA99zvyxAtU-NqO8I_Ynon0ko3T6RVYqT_mRrB4RwstxGxFvsyu9qw"/>
</button>
<!-- Facebook -->
<button class="w-16 h-16 flex items-center justify-center border border-outline-variant rounded-xl bg-white hover:bg-surface-container-low transition-colors shadow-sm overflow-hidden p-0">
<img alt="Facebook" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDbBg7BiVl0Cn4opXF2fZ7svf_PszrYcXtlXYTiJN17ZJ8sUUbqG2fFdv-YDrFCcxNWFHV7Huux_mbho-E4GGegaY1RSBpaPHlDrIOk3fK3PfmHf6plzusC2GbBRBhVNIgUsigOwA1QekdByIa0f9UEmTpABB_wTICwZZKNU53sRDeX8b1I5g3XwoqLoA-550noiFu8GaPEQAHrmYg5YxKUWnkXThFQYOM8n0d-w_Kd69jTOKtdA1rRodV8EW40lakvo1VQUiFtB0M"/>
</button>
<!-- Apple -->
<button class="w-16 h-16 flex items-center justify-center border border-outline-variant rounded-xl bg-white hover:bg-surface-container-low transition-colors shadow-sm overflow-hidden p-0">
<img alt="Apple" class="w-full h-full object-cover p-3" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBej7RcL47zUptchZwtpGIzEx7dUaf8Ac5FdKjGOqf1US1-5hNrJ9l9-bXV7DQXsERBqpTXMEYFoKCpWjALztIsdHtF85ZpV8UgkS0GJW_Zw9Ue3jl9S5T5NiAW_3F4LPylK0WNXzB8gT7SwEcDKow3FjVgGYR9DYnKiUjm5p63xZ3SPyCWfeETB0xHLOCvg1k1FSJNndFDgESwUkbR8RsLuoMTMpnLsOKctDzPicAQSKI2S-sqlwYM3qUYv7JJEhlcur_ogg_vpYM"/>
</button>
</div>
</div>
<!-- Footer Link -->
<div class="text-center mt-auto">
<p class="font-body-md text-body-md text-on-surface-variant">
                Don't have an account? <a class="text-primary font-bold hover:underline" href="#">Sign Up</a>
</p>
</div>
</main>
</body></html>
